openapi: 3.0.0
info:
  description: A simple API to manage a to-do list.
  title: To-Do List API
  version: 1.0.0
servers:
- description: Local development server
  url: http://localhost:8080
paths:
  /tasks:
    get:
      operationId: get_tasks
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Task"
                type: array
          description: Success
      summary: Returns the list of all tasks.
      x-openapi-router-controller: openapi_server.controllers.default_controller
    post:
      operationId: create_task
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
          description: Task created successfully
      summary: Creates a new task.
      x-openapi-router-controller: openapi_server.controllers.default_controller
  /tasks/{taskId}:
    get:
      operationId: get_task_by_id
      parameters:
      - description: ID of the task to retrieve.
        explode: false
        in: path
        name: taskId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
          description: Success
        "404":
          description: Task not found
      summary: Retrieves a task by its ID.
      x-openapi-router-controller: openapi_server.controllers.default_controller
components:
  schemas:
    Task:
      example:
        id: 1
        completed: false
        title: Learn OpenAPI
      properties:
        id:
          example: 1
          title: id
          type: integer
        title:
          example: Learn OpenAPI
          title: title
          type: string
        completed:
          example: false
          title: completed
          type: boolean
      required:
      - completed
      - id
      - title
      title: Task
      type: object
    TaskInput:
      example:
        completed: false
        title: Learn OpenAPI
      properties:
        title:
          example: Learn OpenAPI
          title: title
          type: string
        completed:
          example: false
          title: completed
          type: boolean
      required:
      - title
      title: TaskInput
      type: object
