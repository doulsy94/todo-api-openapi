openapi: 3.0.0
info:
  title: To-Do List API
  description: A simple API to manage a to-do list.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /tasks:
    get:
      summary: Returns the list of all tasks.
      operationId: get_tasks
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      summary: Creates a new task.
      operationId: create_task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /tasks/{taskId}:
    get:
      summary: Retrieves a task by its ID.
      operationId: get_task_by_id
      parameters:
        - name: taskId
          in: path
          required: true
          description: ID of the task to retrieve.
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Learn OpenAPI"
        completed:
          type: boolean
          example: false
      required:
        - id
        - title
        - completed
    TaskInput:
      type: object
      properties:
        title:
          type: string
          example: "Learn OpenAPI"
        completed:
          type: boolean
          example: false
      required:
        - title